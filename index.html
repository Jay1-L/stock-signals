<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>매수 · 추세추종 스캐너</title>
<style>
  :root{
    --bg:#fafafa; --card:#fff; --card-inner:#f7f7f8; --border:#ececee;
    --text:#26262a; --text-sub:#6b6b72; --text-faint:#a9a9b0;
    --blue-bg:#e8f0fe; --blue-tx:#3b6fd4;
    --green-bg:#e5f6ec; --green-tx:#2f9e5f; --green-bd:#bfe8d0;
    --orange-bg:#fdeede; --orange-tx:#e08b2e;
    --profit:#2f9e5f; --loss:#e5484d; --accent:#eab308; --link:#3b82f6;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--bg);color:var(--text);max-width:640px;margin:0 auto;padding:20px 16px 40px}
  h1{font-size:1.6rem;font-weight:700;margin-bottom:16px}
  .mode-tabs{display:flex;gap:8px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:16px}
  .mode-tab{padding:8px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);
    font-size:.95rem;font-weight:600;color:var(--text-sub);cursor:pointer}
  .mode-tab.on{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue-tx)}
  .banner{display:flex;align-items:center;gap:10px;background:var(--green-bg);border:1px solid var(--green-bd);
    border-radius:14px;padding:14px 16px;margin-bottom:16px;color:var(--green-tx);font-size:.95rem;font-weight:600}
  .banner .dot{width:9px;height:9px;border-radius:50%;background:var(--green-tx);flex:none}
  .filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
  .flabel{font-size:.85rem;color:var(--text-faint);margin-right:2px}
  .chip{padding:8px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);
    font-size:.95rem;font-weight:600;color:var(--text);cursor:pointer;white-space:nowrap}
  .chip.on{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue-tx)}
  select.sort{margin-left:auto;padding:8px 12px;border-radius:12px;border:1px solid var(--border);
    background:var(--card-inner);font-size:.95rem;font-weight:600;font-family:inherit;cursor:pointer;color:var(--text)}
  .count{font-size:.9rem;color:var(--text-faint);margin:12px 2px}
  .search{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);font-size:1rem;
    font-family:inherit;background:var(--card);margin-bottom:4px}
  .search:focus{outline:2px solid var(--blue-tx);outline-offset:-1px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;margin-bottom:14px;overflow:hidden}
  .card-head{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:12px;padding:20px 18px 8px;cursor:pointer}
  .rank{color:var(--text-faint);font-size:1rem;min-width:24px}
  .name{font-size:1.12rem;font-weight:700;line-height:1.3}
  .name small{font-weight:500;color:var(--text-faint);font-size:.78rem;margin-left:6px}
  .badge{font-size:.9rem;font-weight:600;padding:5px 12px;border-radius:10px;white-space:nowrap}
  .badge.avg{background:var(--blue-bg);color:var(--blue-tx)}
  .badge.box{background:var(--green-bg);color:var(--green-tx)}
  .badge.high{background:var(--orange-bg);color:var(--orange-tx)}
  .chev{color:var(--text-faint);transition:transform .2s;font-size:.8rem}
  .card.open .chev{transform:rotate(180deg)}
  .card-sub{padding:0 18px 18px 54px;color:var(--text-sub);font-size:.98rem}
  .detail{display:none;background:var(--card-inner);border-top:1px solid var(--border);padding:16px 18px 18px}
  .card.open .detail{display:block}
  .zone-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px}
  .zone-label{color:var(--text-sub);font-size:.95rem}
  .zone-val{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:1.02rem;font-weight:600}
  .zone-badge{background:var(--green-bg);color:var(--green-tx);border:1px solid var(--green-bd);
    border-radius:10px;padding:5px 12px;font-size:.9rem;font-weight:600}
  .zone-badge.out{background:#fdecec;color:var(--loss);border-color:#f6c7c8}
  .close-price{color:var(--text-faint);font-size:.95rem}
  .close-price b{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 8px;margin-bottom:14px}
  .stat{font-size:.95rem;color:var(--text-sub);display:flex;gap:6px;align-items:baseline;flex-wrap:wrap}
  .stat b{color:var(--text);font-family:"SF Mono",ui-monospace,Menlo,monospace;font-weight:600}
  .stat b.up{color:var(--profit)} .stat b.down{color:var(--loss)}
  .more-link{color:var(--link);font-size:.95rem;font-weight:500;cursor:pointer;background:none;border:none;padding:0;font-family:inherit}
