<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>매수 · 추세추종 스캐너</title>
<style>
  :root{
    --bg:#fafafa; --card:#fff; --card-inner:#f7f7f8; --border:#ececee;
    --text:#26262a; --text-sub:#6b6b72; --text-faint:#a9a9b0;
    --blue-bg:#e8f0fe; --blue-tx:#3b6fd4;
    --green-bg:#e5f6ec; --green-tx:#2f9e5f; --green-bd:#bfe8d0;
    --orange-bg:#fdeede; --orange-tx:#e08b2e;
    --profit:#2f9e5f; --loss:#e5484d; --accent:#eab308; --link:#3b82f6;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--bg);color:var(--text);max-width:640px;margin:0 auto;padding:20px 16px 40px}
  h1{font-size:1.6rem;font-weight:700;margin-bottom:16px}
  .mode-tabs{display:flex;gap:8px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:16px}
  .mode-tab{padding:8px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);
    font-size:.95rem;font-weight:600;color:var(--text-sub);cursor:pointer}
  .mode-tab.on{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue-tx)}
  .banner{display:flex;align-items:center;gap:10px;background:var(--green-bg);border:1px solid var(--green-bd);
    border-radius:14px;padding:14px 16px;margin-bottom:12px;color:var(--green-tx);font-size:.95rem;font-weight:600}
  .banner .dot{width:9px;height:9px;border-radius:50%;background:var(--green-tx);flex:none}
  .warn-banner{display:none;background:var(--orange-bg);border:1px solid #f7d9b3;
    border-radius:14px;padding:13px 16px;margin-bottom:14px;color:var(--orange-tx);
    font-size:.92rem;font-weight:500;line-height:1.55}
  .warn-banner.show{display:block}
  .warn-banner b{font-weight:700}
  .regime-row{display:flex;gap:8px;margin-bottom:14px}
  .regime{flex:1;border-radius:14px;padding:12px 14px;font-size:.9rem;font-weight:600;line-height:1.5;border:1px solid}
  .regime.bull{background:var(--green-bg);color:var(--green-tx);border-color:var(--green-bd)}
  .regime.bear{background:#fdecec;color:var(--loss);border-color:#f6c7c8}
  .regime small{display:block;font-weight:500;opacity:.85;font-size:.8rem;margin-top:2px}
  .filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
  .flabel{font-size:.85rem;color:var(--text-faint);margin-right:2px}
  .chip{padding:8px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);
    font-size:.95rem;font-weight:600;color:var(--text);cursor:pointer;white-space:nowrap}
  .chip.on{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue-tx)}
  select.sort{margin-left:auto;padding:8px 12px;border-radius:12px;border:1px solid var(--border);
    background:var(--card-inner);font-size:.95rem;font-weight:600;font-family:inherit;cursor:pointer;color:var(--text)}
  .count{font-size:.9rem;color:var(--text-faint);margin:12px 2px}
  .search{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);font-size:1rem;
    font-family:inherit;background:var(--card);margin-bottom:4px}
  .search:focus{outline:2px solid var(--blue-tx);outline-offset:-1px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;margin-bottom:14px;overflow:hidden}
  .card-head{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:12px;padding:20px 18px 8px;cursor:pointer}
  .rank{color:var(--text-faint);font-size:1rem;min-width:24px}
  .name{font-size:1.12rem;font-weight:700;line-height:1.3}
  .name small{font-weight:500;color:var(--text-faint);font-size:.78rem;margin-left:6px}
  .badge{font-size:.9rem;font-weight:600;padding:5px 12px;border-radius:10px;white-space:nowrap}
  .badge.avg{background:var(--blue-bg);color:var(--blue-tx)}
  .badge.box{background:var(--green-bg);color:var(--green-tx)}
  .badge.high{background:var(--orange-bg);color:var(--orange-tx)}
  .chev{color:var(--text-faint);transition:transform .2s;font-size:.8rem}
  .card.open .chev{transform:rotate(180deg)}
  .card-sub{padding:0 18px 18px 54px;color:var(--text-sub);font-size:.98rem}
  .detail{display:none;background:var(--card-inner);border-top:1px solid var(--border);padding:16px 18px 18px}
  .card.open .detail{display:block}
  .zone-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px}
  .zone-label{color:var(--text-sub);font-size:.95rem}
  .zone-val{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:1.02rem;font-weight:600}
  .zone-badge{background:var(--green-bg);color:var(--green-tx);border:1px solid var(--green-bd);
    border-radius:10px;padding:5px 12px;font-size:.9rem;font-weight:600}
  .zone-badge.out{background:#fdecec;color:var(--loss);border-color:#f6c7c8}
  .close-price{color:var(--text-faint);font-size:.95rem}
  .close-price b{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 8px;margin-bottom:14px}
  .stat{font-size:.95rem;color:var(--text-sub);display:flex;gap:6px;align-items:baseline;flex-wrap:wrap}
  .stat b{color:var(--text);font-family:"SF Mono",ui-monospace,Menlo,monospace;font-weight:600}
  .stat b.up{color:var(--profit)} .stat b.down{color:var(--loss)}
  .more-link{color:var(--link);font-size:.95rem;font-weight:500;cursor:pointer;background:none;border:none;padding:0;font-family:inherit}
  table.ptable{width:100%;border-collapse:collapse;margin-top:12px;font-size:.88rem;display:none}
  .card.ptable-open table.ptable{display:table}
  .ptable th{color:var(--text-faint);font-weight:600;text-align:right;padding:6px 4px;border-bottom:1px solid var(--border)}
  .ptable th:first-child,.ptable td:first-child{text-align:left}
  .ptable td{text-align:right;padding:7px 4px;border-bottom:1px solid var(--border);font-family:"SF Mono",ui-monospace,Menlo,monospace}
  .ptable td.up{color:var(--profit)} .ptable td.down{color:var(--loss)}
  .ptable tr.best td{background:var(--blue-bg);font-weight:700}
  .empty{padding:60px 20px;text-align:center;color:var(--text-faint);line-height:1.7}
</style>
</head>
<body>

<h1>매수</h1>

<div class="mode-tabs">
  <button class="mode-tab on" data-mode="trend">추세추종</button>
  <button class="mode-tab" data-mode="season">계절성</button>
</div>

<div class="banner">
  <span class="dot"></span><span id="asOf">신호 기준일 로딩 중…</span>
</div>
<div class="warn-banner" id="warnBanner"></div>
<div class="regime-row" id="regimeRow"></div>

<input type="search" class="search" id="search" placeholder="종목명 검색">

<div class="filter-row">
  <span class="flabel">국가</span>
  <button class="chip on" data-f="country" data-v="all">전체</button>
  <button class="chip" data-f="country" data-v="KR">한국</button>
  <button class="chip" data-f="country" data-v="US">미국</button>
  <span class="flabel">자산</span>
  <button class="chip on" data-f="asset" data-v="all">전체</button>
  <button class="chip" data-f="asset" data-v="stock">주식</button>
  <button class="chip" data-f="asset" data-v="etf">ETF</button>
</div>
<div class="filter-row">
  <span class="flabel">신호</span>
  <button class="chip on" data-f="sig" data-v="all">전체</button>
  <button class="chip" data-f="sig" data-v="avg">이평</button>
  <button class="chip" data-f="sig" data-v="box">박스</button>
  <button class="chip" data-f="sig" data-v="high">신고가</button>
</div>
<div class="filter-row">
  <span class="flabel">시총</span>
  <button class="chip on" data-f="mcap" data-v="0">전체</button>
  <button class="chip" data-f="mcap" data-v="1e9">≥$1B</button>
  <button class="chip" data-f="mcap" data-v="1e10">≥$10B</button>
  <button class="chip" data-f="mcap" data-v="1e11">≥$100B</button>
  <button class="chip" data-f="mcap" data-v="1e12">≥$1T</button>
  <select class="sort" id="sort">
    <option value="mcap">시총순</option>
    <option value="rs">RS순</option>
    <option value="win">승률순</option>
    <option value="pl">손익비순</option>
    <option value="name">이름순</option>
  </select>
</div>

<div class="count" id="count"></div>
<div id="list"></div>

<script>
"use strict";
const state = { country:"all", asset:"all", sig:"all", mcap:0, sort:"mcap", q:"", mode:"trend" };
let DATA = null;
const SIGNAL = { avg:"이평", box:"박스", high:"신고가" };
const $ = s => document.querySelector(s);

async function load(){
  try{
    const res = await fetch("signals.json", {cache:"no-store"});
    if(!res.ok) throw 0;
    DATA = await res.json();
    let info = "신호 기준일 " + DATA.asOf;
    if(DATA.meta && DATA.meta.scanned){
      info += " · " + DATA.meta.scanned.toLocaleString() + "종목 스캔"
        + " (한국 " + (DATA.meta.krListed||0).toLocaleString()
        + " · 미국 " + (DATA.meta.usListed||0).toLocaleString() + ")";
    }
    $("#asOf").textContent = info;
    if(DATA.meta && DATA.meta.warnings && DATA.meta.warnings.length){
      $("#warnBanner").innerHTML = "<b>⚠ 데이터 수집 경고</b><br>" + DATA.meta.warnings.join("<br>");
      $("#warnBanner").classList.add("show");
    }
    if(DATA.meta && DATA.meta.regime){
      $("#regimeRow").innerHTML = Object.values(DATA.meta.regime).map(r =>
        r.bull
        ? '<div class="regime bull">🟢 '+r.index+' 상승장<small>추세추종 실행 가능</small></div>'
        : '<div class="regime bear">🔴 '+r.index+' 하락·횡보장<small>신호 숨김 — 쉬는 구간</small></div>'
      ).join("");
    }
    render();
  }catch{
    $("#asOf").textContent = "signals.json이 아직 없어요 — Actions에서 첫 스캔을 실행하세요";
  }
}

function filtered(){
  if(!DATA) return [];
  let arr = DATA.stocks.filter(s =>
    (state.country==="all" || s.country===state.country) &&
    (state.asset==="all"   || s.asset===state.asset) &&
    (state.sig==="all"     || s.sig===state.sig) &&
    (state.mcap===0        || (s.mcap||0) >= state.mcap) &&
    (!state.q || s.name.toLowerCase().includes(state.q))
  );
  const key = state.sort;
  arr.sort((a,b)=>{
    if(key==="name") return a.name.localeCompare(b.name,"ko");
    if(key==="mcap") return (b.mcap||0)-(a.mcap||0);
    if(key==="rs")   return b.rs-a.rs;
    if(key==="win")  return b.stats.win-a.stats.win;
    if(key==="pl")   return b.stats.pl-a.stats.pl;
    return 0;
  });
  return arr;
}

const fmt = n => n>=1000 ? n.toLocaleString("ko-KR",{maximumFractionDigits:0}) : n.toLocaleString("ko-KR",{maximumFractionDigits:2});
const money = m => !m ? "" : m>=1e12 ? "$"+(m/1e12).toFixed(1)+"T" : m>=1e9 ? "$"+(m/1e9).toFixed(1)+"B" : "$"+(m/1e6).toFixed(0)+"M";

function periodTable(periods, bestDays){
  const rows = periods.map(p =>
    '<tr class="'+(p.days===bestDays?"best":"")+'">'+
    '<td>'+p.days+'일</td><td>'+p.win+'%</td><td>'+p.n+'</td>'+
    '<td class="up">+'+p.avgP+'%</td><td class="down">'+p.avgL+'%</td><td>'+p.pl+'</td></tr>'
  ).join("");
  return '<table class="ptable"><thead><tr><th>보유</th><th>승률</th><th>표본</th>'+
    '<th>평균이익</th><th>평균손실</th><th>손익비</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function render(){
  if(state.mode==="season"){
    $("#count").textContent = "";
    $("#list").innerHTML = '<div class="empty">계절성 모드는 준비 중이에요.</div>';
    return;
  }
  const arr = filtered();
  $("#count").textContent = arr.length + "종목";
  if(!arr.length){
    const allBear = DATA && DATA.meta && DATA.meta.regime &&
      Object.values(DATA.meta.regime).every(r => !r.bull);
    $("#list").innerHTML = allBear
      ? '<div class="empty">모든 시장이 하락·횡보장이에요.<br>추세추종은 상승장에서만 — 지금은 쉬는 게 전략입니다. 🛌</div>'
      : '<div class="empty">조건에 맞는 종목이 없어요.<br>필터를 조정해 보세요.</div>';
    return;
  }
  $("#list").innerHTML = arr.map((s,i)=>
    '<div class="card">'+
      '<div class="card-head">'+
        '<span class="rank">'+(i+1)+'</span>'+
        '<span class="name">'+s.name+(s.mcap?'<small>'+money(s.mcap)+'</small>':'')+'</span>'+
        '<span class="badge '+s.sig+'">'+SIGNAL[s.sig]+'</span>'+
        '<span class="chev">▼</span>'+
      '</div>'+
      '<div class="card-sub">'+s.desc+'</div>'+
      '<div class="detail">'+
        '<div class="zone-row">'+
          '<span class="zone-label">매수 구간</span>'+
          '<span class="zone-val">'+fmt(s.zone[0])+'~'+fmt(s.zone[1])+'</span>'+
          '<span class="zone-badge'+(s.inZone?'':' out')+'">'+(s.inZone?'구간 내':'구간 밖')+'</span>'+
          '<span class="close-price">· 종가 <b>'+fmt(s.close)+'</b></span>'+
        '</div>'+
        '<div class="stats">'+
          '<div class="stat">종합 RS <b>'+s.rs+'</b></div>'+
          '<div class="stat">승률 <b>'+s.stats.win+'%</b></div>'+
          '<div class="stat">표본수 <b>'+s.stats.n+'</b></div>'+
          '<div class="stat">평균이익 <b class="up">+'+s.stats.avgP+'%</b></div>'+
          '<div class="stat">평균손실 <b class="down">'+s.stats.avgL+'%</b></div>'+
          '<div class="stat">손익비 <b>'+s.stats.pl+'</b></div>'+
        '</div>'+
        '<button class="more-link">전체 '+s.periods.length+'기간 통계표 펼치기 ›</button>'+
        periodTable(s.periods, s.stats.days)+
      '</div>'+
    '</div>').join("");
}

$("#list").addEventListener("click", e=>{
  const card = e.target.closest(".card");
  if(!card) return;
  if(e.target.closest(".more-link")){ card.classList.toggle("ptable-open"); return; }
  card.classList.toggle("open");
});
document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
  document.querySelectorAll('.chip[data-f="'+c.dataset.f+'"]').forEach(x=>x.classList.remove("on"));
  c.classList.add("on");
  state[c.dataset.f] = c.dataset.f==="mcap" ? Number(c.dataset.v) : c.dataset.v;
  render();
}));
document.querySelectorAll(".mode-tab").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".mode-tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on");
  state.mode = t.dataset.mode;
  render();
}));
$("#sort").addEventListener("change", e=>{ state.sort=e.target.value; render(); });
$("#search").addEventListener("input", e=>{ state.q=e.target.value.trim().toLowerCase(); render(); });

load();
</script>
</body>
</html>
